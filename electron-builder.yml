appId: com.ai-analyzer.app
productName: Ai-analyzer
copyright: Copyright © 2025 Ai-analyzer

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - "!out/renderer/**/*"

extraResources:
  - from: out/renderer
    to: renderer

# Windows configuration
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icon.ico

# NSIS installer configuration
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Ai-analyzer

# Portable configuration
portable:
  artifactName: "${productName}-${version}-Portable.${ext}"

# macOS configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false

# Linux configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Development
  maintainer: Ai-analyzer
  vendor: Ai-analyzer

# Auto-update configuration (publish to GitHub Releases)
publish:
  provider: github
  owner: lanterxyz
  repo: Ai-analyzer
